<svg width="540" height="320" viewBox="0 0 540 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient and border -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>

    <!-- Google Fonts import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Inter:wght@300;400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Background rectangle with border -->
  <rect x="1" y="1" width="538" height="318" rx="16"
        fill="url(#bgGradient)"
        stroke="#30363d"
        stroke-width="1"/>

  <!-- .cal text -->
  <text x="270" y="140"
        font-family="'JetBrains Mono', monospace"
        font-size="96"
        font-weight="700"
        fill="#4a9eff"
        text-anchor="middle"
        filter="drop-shadow(0 0 40px rgba(74, 158, 255, 0.3))">.cal</text>

  <!-- Full name -->
  <text x="270" y="185"
        font-family="'Inter', sans-serif"
        font-size="20"
        font-weight="400"
        fill="#e6edf3"
        text-anchor="middle"
        letter-spacing="2">Cascade Analysis Language</text>

  <!-- Keywords -->
  <g transform="translate(270, 210)" text-anchor="middle">
    <!-- FORAGE -->
    <rect x="-130" y="0" width="85" height="32" rx="4"
          fill="none"
          stroke="#64ffda"
          stroke-opacity="0.2"/>
    <text x="-87.5" y="22"
          font-family="'JetBrains Mono', monospace"
          font-size="14"
          fill="#64ffda"
          text-anchor="middle">FORAGE</text>

    <!-- DRIFT -->
    <rect x="-40" y="0" width="70" height="32" rx="4"
          fill="none"
          stroke="#64ffda"
          stroke-opacity="0.2"/>
    <text x="-5" y="22"
          font-family="'JetBrains Mono', monospace"
          font-size="14"
          fill="#64ffda"
          text-anchor="middle">DRIFT</text>

    <!-- FETCH -->
    <rect x="35" y="0" width="70" height="32" rx="4"
          fill="none"
          stroke="#64ffda"
          stroke-opacity="0.2"/>
    <text x="70" y="22"
          font-family="'JetBrains Mono', monospace"
          font-size="14"
          fill="#64ffda"
          text-anchor="middle">FETCH</text>

    <!-- CHIRP -->
    <rect x="110" y="0" width="70" height="32" rx="4"
          fill="none"
          stroke="#64ffda"
          stroke-opacity="0.2"/>
    <text x="145" y="22"
          font-family="'JetBrains Mono', monospace"
          font-size="14"
          fill="#64ffda"
          text-anchor="middle">CHIRP</text>
  </g>
</svg>
