<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="cascade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="400" height="400" rx="80" fill="#030712"/>

  <!-- Cascade waterfall symbol - water flowing down in steps -->
  <path d="
    M120 80
    L120 120
    Q120 140 140 140
    L200 140
    L200 180
    Q200 200 220 200
    L280 200
    L280 240
    Q280 260 260 260
    L180 260
    L180 300
    Q180 320 200 320
    L300 320
  " stroke="url(#cascade)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Accent dot at cascade origin -->
  <circle cx="120" cy="68" r="16" fill="#93c5fd"/>
</svg>
